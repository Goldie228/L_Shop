<!DOCTYPE html>
<html lang="ru" class="dark-theme">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="L_Shop - интернет-магазин с широким ассортиментом товаров" />
    <meta name="theme-color" content="#2563eb" />

    <title>L_Shop - Интернет-магазин</title>

    <!-- Фавикон -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%232563eb' width='100' height='100' rx='20'/><text x='50' y='70' font-size='60' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'>L</text></svg>"
    />

    <!-- Шрифты Google - Inter с оптимизацией загрузки -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <!-- Fallback шрифт если Google Fonts недоступен -->
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- Стили загружаются через JS импорты в app.ts -->
  </head>
  <body>
    <!-- Корневой элемент приложения -->
    <div id="app">
      <!-- Состояние загрузки до загрузки JS -->
      <div class="app-loading">
        <div class="spinner spinner--lg"></div>
        <p>Загрузка...</p>
      </div>
    </div>

    <!-- Запасной вариант при отключенном JavaScript -->
    <noscript>
      <div class="noscript-warning">
        <h1>JavaScript отключен</h1>
        <p>Для работы L_Shop необходимо включить JavaScript в настройках браузера.</p>
      </div>
    </noscript>

    <!-- TypeScript entry point для Vite в режиме разработки -->
    <script type="module" src="/app.ts"></script>
  </body>
</html>
